name: Laravel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan config:clear
          php artisan cache:clear

      - name: Generate app key
        env:
          APP_KEY: base64:3Wr6ozqBUEY0zCZsfPi/pt6WLLB+Nw0Vz8xE3HM5htM=
        run: |
          echo "APP_KEY=$APP_KEY" >> .env

      - name: Run migrations
        env:
          APP_ENV: testing
          APP_KEY: base64:3Wr6ozqBUEY0zCZsfPi/pt6WLLB+Nw0Vz8xE3HM5htM=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Run tests
        env:
          APP_ENV: testing
          APP_KEY: base64:3Wr6ozqBUEY0zCZsfPi/pt6WLLB+Nw0Vz8xE3HM5htM=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --debug